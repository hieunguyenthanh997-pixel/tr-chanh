      <path d="M 298,452 L 262,430 Q 250,452 262,474 Z"/>
      <path d="M 298,452 L 334,430 Q 346,452 334,474 Z"/>
      <circle cx="298" cy="452" r="10"/>
    </g>
    <g fill="#ff4f9a">
      <path d="M 726,452 L 690,430 Q 678,452 690,474 Z"/>
      <path d="M 726,452 L 762,430 Q 774,452 762,474 Z"/>
      <circle cx="726" cy="452" r="10"/>
    </g>

    <!-- dress -->
    <path d="M 434,618 Q 512,598 590,618 L 626,780 Q 512,808 398,780 Z" fill="#ff4f9a"/>
    <!-- sleeves -->
    <circle cx="424" cy="646" r="26" fill="#ff4f9a"/>
    <circle cx="600" cy="646" r="26" fill="#ff4f9a"/>
    <!-- feet with shoes -->
    <ellipse cx="466" cy="806" rx="30" ry="17" fill="#ff87b8"/>
    <ellipse cx="558" cy="806" rx="30" ry="17" fill="#ff87b8"/>
  </g>

  <!-- collar -->
  <path d="M 472,612 Q 512,640 552,612 Q 532,600 512,602 Q 492,600 472,612 Z" fill="#fff" stroke="#2a1a22" stroke-width="7"/>

  <!-- dress dots -->
  <g fill="#fff" opacity="0.85">
    <circle cx="440" cy="700" r="8"/><circle cx="512" cy="740" r="8"/>
    <circle cx="584" cy="700" r="8"/><circle cx="470" cy="765" r="8"/>
    <circle cx="560" cy="768" r="8"/>
  </g>

  <!-- face -->
  <g stroke="none">
    <ellipse cx="448" cy="478" rx="27" ry="37" fill="#2a1a22"/>
    <ellipse cx="576" cy="478" rx="27" ry="37" fill="#2a1a22"/>
    <circle cx="457" cy="464" r="11" fill="#fff"/>
    <circle cx="585" cy="464" r="11" fill="#fff"/>
    <circle cx="441" cy="492" r="5" fill="#fff"/>
    <circle cx="569" cy="492" r="5" fill="#fff"/>
    <ellipse cx="404" cy="530" rx="28" ry="16" fill="#ff9ec4" opacity="0.85"/>
    <ellipse cx="620" cy="530" rx="28" ry="16" fill="#ff9ec4" opacity="0.85"/>
    <path d="M 490,528 Q 512,552 534,528" fill="none" stroke="#2a1a22" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- boba cup -->
  <g stroke="#2a1a22" stroke-width="8" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 470,660 L 478,772 Q 512,784 546,772 L 554,660 Z" fill="#ffe9f2"/>
    <path d="M 470,706 L 474,762 Q 512,774 550,762 L 554,706 Q 512,720 470,706 Z" fill="#ffc1d9" stroke="none"/>
    <circle cx="494" cy="744" r="9" fill="#4a2a2e" stroke="none"/>
    <circle cx="518" cy="754" r="9" fill="#4a2a2e" stroke="none"/>
    <circle cx="537" cy="740" r="9" fill="#4a2a2e" stroke="none"/>
    <ellipse cx="512" cy="658" rx="44" ry="13" fill="#fff"/>
    <line x1="528" y1="656" x2="552" y2="608" stroke="#ff4f9a" stroke-width="13"/>
    <circle cx="464" cy="708" r="22" fill="#ffdcc5"/>
    <circle cx="560" cy="708" r="22" fill="#ffdcc5"/>
  </g>

  </g>
  <text x="880" y="470" font-family="Arial, sans-serif" font-size="220" font-weight="bold" fill="#ff4f9a" letter-spacing="4">EM BÉ TÍT</text>
  <text x="886" y="600" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#ff87b8" letter-spacing="8">TRÀ CHANH ♥ TRÀ SỮA</text>
</svg>
