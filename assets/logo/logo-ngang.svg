<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2200 900">
  <g transform="translate(-115,-125) scale(1.25)">
  
  <g stroke="#2a1a22" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- braided pigtails: chains of circles -->
    <circle cx="290" cy="510" r="40" fill="#4a2a2e"/>
    <circle cx="286" cy="580" r="32" fill="#4a2a2e"/>
    <circle cx="282" cy="638" r="24" fill="#4a2a2e"/>
    <circle cx="734" cy="510" r="40" fill="#4a2a2e"/>
    <circle cx="738" cy="580" r="32" fill="#4a2a2e"/>
    <circle cx="742" cy="638" r="24" fill="#4a2a2e"/>

    <!-- head -->
    <circle cx="512" cy="460" r="170" fill="#ffdcc5"/>

    <!-- hair cap with scalloped bangs -->
    <path d="M 338,500 Q 330,272 512,268 Q 694,272 686,500
             Q 662,438 630,452 Q 610,398 566,428 Q 544,388 512,418
             Q 480,388 458,428 Q 414,398 394,452 Q 362,438 338,500 Z" fill="#4a2a2e"/>

